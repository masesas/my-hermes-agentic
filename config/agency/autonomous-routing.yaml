# Morph AI Agency autonomous routing policy.
# This file is copied to /var/lib/morph-agency/config/autonomous-routing.yaml
# by scripts/44-configure-agent-routing.sh.

version: 1
mode: orchestrated
queue_db: /var/lib/morph-agency/queue.db
handoff_dir: /var/lib/morph-agency/handoff

loop_guard:
  max_reply_depth: 3
  require_task_id_for_agent_messages: true
  ignore_unassigned_bot_messages: true
  orchestrator_is_only_task_assigner: true
  workers_may_not_delegate: true

profiles:
  orchestrator:
    role: task_router
    discord_channel: orchestrator
    lifecycle: always_on
    can_receive_from:
      - human
    can_assign_to:
      - researcher
      - executor
    can_report_to:
      - human
    queue_actions:
      - create_task
      - read_task_result
      - retry_task
      - cancel_task

  researcher:
    role: research_worker
    discord_channel: researcher
    lifecycle: spawn_on_demand
    can_receive_from:
      - orchestrator
    can_assign_to: []
    can_report_to:
      - orchestrator
    queue_actions:
      - claim_assigned_task
      - append_task_event
      - write_task_result

  executor:
    role: execution_worker
    discord_channel: executor
    lifecycle: spawn_on_demand
    can_receive_from:
      - orchestrator
    can_assign_to: []
    can_report_to:
      - orchestrator
    queue_actions:
      - claim_assigned_task
      - append_task_event
      - write_task_result

discord:
  # ── Addressing semantics ──────────────────────────────────────────
  # Mention is required UNLESS the message is in the bot's owner_channel.
  default_require_mention: true
  # Inside a thread, prior participation does NOT imply addressing. The bot
  # must be explicitly @mentioned in the latest message to respond. This
  # prevents "all participants reply when nobody is mentioned" behavior.
  thread_addressing_mode: explicit_mention_only
  thread_participation_implies_addressing: false
  # When multiple bots could potentially respond, only the bot whose
  # owner_channel matches the parent channel responds to un-mentioned messages
  # from humans. Other bots stay silent.
  unmentioned_human_message_owner_only: true
  # When a message explicitly mentions one bot, all other bots stay silent
  # even if they were participants of the thread.
  defer_when_other_agent_mentioned: true
  auto_thread: true
  ignore_bots_by_default: true

  # ── Owner channel map (channel -> profile that owns it) ───────────
  # Used to resolve "who is the default responder" in a given channel/thread.
  owner_channel_map:
    orchestrator: orchestrator
    researcher: researcher
    executor: executor

  # ── Bot-to-bot allow list ─────────────────────────────────────────
  allowed_bot_senders:
    researcher:
      - MorphOrchestrator
    executor:
      - MorphOrchestrator
    orchestrator:
      - MorphResearcher
      - MorphExecutor
  progress_channels:
    status: status
    escalation: escalation

projects:
  default_project: default
  # Discord thread-name convention: the orchestrator parses the thread title to
  # determine the active project. Format: "proj/<project>/<topic>".
  thread_name_pattern: '^proj/(?P<project>[a-z0-9][a-z0-9._-]{0,63})(/.*)?$'
  # Optional explicit mapping from thread or channel topic to project name.
  # This list is consulted before the regex above.
  overrides: []
  # If no project can be inferred and the message is not in a project thread,
  # the orchestrator MUST ask the user to specify a project. Workers MUST
  # reject any task hand-off without an explicit project.
  require_explicit_project: true

message_contract:
  agent_to_agent:
    required_fields:
      - task_id
      - from_profile
      - to_profile
      - intent
    allowed_intents:
      - task_assignment
      - progress_update
      - clarification_request
      - task_result
      - error_report
  worker_result_statuses:
    - succeeded
    - failed
    - blocked
    - partial
