# Discord autonomy policy for the orchestrator profile.
# Installed into ~/.hermes/profiles/orchestrator/discord-policy.yaml by setup scripts.

profile: orchestrator
routing_policy: /var/lib/morph-agency/config/autonomous-routing.yaml
queue_db: /var/lib/morph-agency/queue.db
handoff_dir: /var/lib/morph-agency/handoff

# ── Channel Ownership ───────────────────────────────────────────────
# This bot is the default responder in its owner_channel.
# In other channels/threads, it ONLY responds when explicitly @mentioned.
owner_channel: orchestrator
reply_only_in_owner_channel_or_when_mentioned: true

# ── Thread Addressing ───────────────────────────────────────────────
# In any thread, being a previous participant does NOT grant implicit
# addressing. Only explicit @mention triggers a response.
thread_addressing_mode: explicit_mention_only

# ── Reply Policy ────────────────────────────────────────────────────
reply_policy:
  # In owner_channel (orchestrator): respond to un-mentioned messages FROM HUMANS.
  # Everywhere else: require explicit @mention.
  require_mention_outside_owner_channel: true
  # Even in owner_channel, if another agent is explicitly mentioned, stay silent.
  defer_when_other_agent_mentioned: true
  auto_thread: true
  ignore_bots_by_default: true
  require_task_id_for_agent_messages: true
  max_reply_depth: 3

# ── Channel Map (read-only reference) ──────────────────────────────
channels:
  orchestrator: orchestrator
  researcher: researcher
  executor: executor
  status: status
  escalation: escalation

# ── Source Controls ─────────────────────────────────────────────────
source_controls:
  accepts_human_tasks: true
  accepts_direct_human_worker_tasks: false
  allowed_bot_senders:
    - MorphResearcher
    - MorphExecutor
  denied_bot_senders: []
  required_task_id_from_bots: true
  worker_to_worker_messages: denied
